[General]
cmdenv-express-mode = true
cmdenv-autoflush = true
cmdenv-status-frequency = 1s

network = V2VIntersectionScenario

##########################################################
#            Simulation parameters                       #
##########################################################
debug-on-errors = true
print-undisposed = true

sim-time-limit = 200s

**.scalar-recording = true
**.vector-recording = true

##########################################################
#            TraCIScenarioManager parameters            #
##########################################################
*.manager.updateInterval = 0.1s
*.manager.host = "localhost"
*.manager.port = 9999
*.manager.autoShutdown = true
*.manager.launchConfig = xmldoc("intersection.launchd.xml")

# SUMO Configuration
*.manager.moduleType = "org.car2x.veins.subprojects.veins_inet.VeinsInetCar"
*.manager.moduleName = "vehicle"
*.manager.moduleDisplayString = ""

##########################################################
#            11p specific parameters                     #
#                                                        #
#                    NIC-Settings                        #
##########################################################
*.connectionManager.sendDirect = true
*.connectionManager.maxInterfDist = 2600m
*.connectionManager.drawMaxIntfDist = false

*.**.nic.mac1609_4.useServiceChannel = false

*.**.nic.mac1609_4.txPower = 20mW
*.**.nic.mac1609_4.bitrate = 6Mbps
*.**.nic.phy80211p.minPowerLevel = -110dBm

*.**.nic.phy80211p.useNoiseFloor = true
*.**.nic.phy80211p.noiseFloor = -98dBm

*.**.nic.phy80211p.decider = xmldoc("config.xml")
*.**.nic.phy80211p.analogueModels = xmldoc("config.xml")
*.**.nic.phy80211p.usePropagationDelay = true

*.**.nic.phy80211p.antenna = xmldoc("antenna.xml", "/root/Antenna[@id='monopole']")

##########################################################
#                      App Layer                         #
##########################################################
# Vehicle Application
*.vehicle[*].numApps = 1
*.vehicle[*].app[0].typename = "V2VCollisionAvoidanceApp"
*.vehicle[*].app[0].interface = "wlan0"

# V2V Parameters
*.vehicle[*].app[0].commRange = 60.0
*.vehicle[*].app[0].criticalDistance = 45.0
*.vehicle[*].app[0].junctionX = 0.0
*.vehicle[*].app[0].junctionY = 0.0
*.vehicle[*].app[0].beaconInterval = 0.1s

##########################################################
#                    Mobility                            #
##########################################################
*.vehicle[*].mobility.typename = "VeinsInetMobility"

##########################################################
#                   Radio Medium                         #
##########################################################
*.radioMedium.obstacleLossType = "IdealObstacleLoss"
*.radioMedium.mediumLimitCache.carrierFrequency = 5.9GHz

##########################################################
#                 Obstacle Settings                      #
##########################################################
*.obstacles.obstacles = xmldoc("obstacles.xml")

##########################################################
#              Visualizer Settings                       #
##########################################################
*.visualizer.*.routingTableVisualizer.displayRoutingTables = false
*.visualizer.*.routingTableVisualizer.displayRoutesIndividually = false

*.visualizer.*.dataLinkVisualizer.displayLinks = true
*.visualizer.*.networkRouteVisualizer.displayRoutes = true

*.visualizer.*.mobilityVisualizer.displayVelocities = true
*.visualizer.*.mobilityVisualizer.displayMovementTrails = true